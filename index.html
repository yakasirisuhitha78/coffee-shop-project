<!DOCTYPE html>
<html>
<head>
    <title>Cute Coffee Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4e1d2;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px gray;
        }

        h1 {
            color: brown;
        }

        select, input {
            padding: 8px;
            margin: 10px;
            width: 80%;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            background: brown;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid gray;
            padding: 8px;
        }

        th {
            background: #eee;
        }

        .total {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ Cute Coffee Shop</h1>

    <select id="coffee">
        <option value="100">Espresso - ₹100</option>
        <option value="150">Cappuccino - ₹150</option>
        <option value="180">Latte - ₹180</option>
        <option value="200">Cold Coffee - ₹200</option>
    </select>

    <input type="number" id="quantity" placeholder="Enter Quantity" min="1">

    <br>
    <button onclick="addToCart()">Add To Cart</button>

    <table id="cartTable">
        <tr>
            <th>Coffee</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
    </table>

    <div class="total" id="billDetails"></div>
</div>

<script>
    let cart = [];

    function addToCart() {
        let coffeeSelect = document.getElementById("coffee");
        let coffeeName = coffeeSelect.options[coffeeSelect.selectedIndex].text;
        let price = parseInt(coffeeSelect.value);
        let quantity = parseInt(document.getElementById("quantity").value);

        if (!quantity || quantity <= 0) {
            alert("Enter valid quantity");
            return;
        }

        let itemTotal = price * quantity;

        let item = {
            name: coffeeName,
            price: price,
            quantity: quantity,
            total: itemTotal
        };

        cart.push(item);
        displayCart();
    }

    function displayCart() {
        let table = document.getElementById("cartTable");

        table.innerHTML = `
            <tr>
                <th>Coffee</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        `;

        let subtotal = 0;

        cart.forEach((item, index) => {
            subtotal += item.total;

            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>₹${item.price}</td>
                    <td>${item.quantity}</td>
                    <td>₹${item.total}</td>
                    <td><button onclick="removeItem(${index})">Remove</button></td>
                </tr>
            `;
        });

        let gst = subtotal * 0.05;
        let finalTotal = subtotal + gst;

        document.getElementById("billDetails").innerHTML =
            `Subtotal: ₹${subtotal} <br>
             GST (5%): ₹${gst.toFixed(2)} <br>
             <strong>Total: ₹${finalTotal.toFixed(2)}</strong>`;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        displayCart();
    }
</script>

</body>
</html>
